# Simulated Telegraf configuration sample for portfolio review only.
# This is not a real company, plant, dealer, edge, OPC UA, MQTT, InfluxDB,
# Grafana, cloud, or production integration.

[agent]
  interval = "15s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000

[[inputs.mqtt_consumer]]
  servers = ["tcp://localhost:1883"]
  topics = [
    "industrial-cx/line-01/pump-01/telemetry",
    "industrial-cx/line-01/compressor-02/telemetry",
    "industrial-cx/line-02/pump-01/telemetry",
    "industrial-cx/line-02/testbench-01/telemetry"
  ]
  data_format = "json"
  tag_keys = ["asset_id"]
  json_time_key = "timestamp"
  json_time_format = "2006-01-02T15:04:05Z07:00"

[[outputs.influxdb_v2]]
  urls = ["http://localhost:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "portfolio-simulation"
  bucket = "industrial_cx_sim"
