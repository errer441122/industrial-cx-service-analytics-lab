name: Validate CX analyst lab

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate the sample (must be byte-stable)
        run: |
          python src/generate_cx_dataset.py
          git diff --exit-code -- data/

      - name: Validate data
        run: python src/validate_cx_data.py

      - name: Rebuild summary and driver analysis
        run: |
          python src/build_cx_summary.py
          python src/cx_driver_analysis.py

      - name: Run test suite
        run: python -m unittest discover -s tests
