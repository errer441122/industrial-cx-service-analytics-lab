name: Validate CX workbook

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install reviewer ML baseline dependencies
        run: python -m pip install -r ml-baseline/requirements.txt

      - name: Validate workbook data, wiring, and test suites
        run: npm test

      - name: Run pytest collection
        run: python -m pytest -q

      - name: Execute reviewer-visible industrial ML and production pipelines
        run: |
          python industrial-cx-ai-lab/src/run_pipeline.py
          python production-sim-stack/src/orchestrate.py
          python production-sim-stack/src/mqtt_simulator.py --dry-run --messages 5
          python ml-baseline/train_model.py
          python benchmarks/industrial_scoring_benchmark.py --quick

      - name: Validate simulated industrial JSON artifacts
        run: |
          python -m json.tool industrial-cx-ai-lab/ops/opcua_tag_map.json
          python -m json.tool industrial-cx-ai-lab/ops/grafana_dashboard.json
          python -m json.tool benchmarks/artifacts/local_cpu_benchmark.json
          python scripts/build_evidence_report.py
